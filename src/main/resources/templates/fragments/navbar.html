<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm sticky-top">
    <div class="container">
        <a class="navbar-brand d-flex align-items-center gap-2" th:href="@{/}">
            <i class="fas fa-coins text-warning fs-4"></i>
            <span class="fw-bold">Moeda Estudantil</span>
        </a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <!-- Menus por perfil -->
            <ul class="navbar-nav me-auto">

                <!-- ALUNO -->
                <li class="nav-item" sec:authorize="hasRole('ALUNO')">
                    <a class="nav-link" th:href="@{/aluno/dashboard}">
                        <i class="fas fa-home me-1"></i>Início
                    </a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('ALUNO')">
                    <a class="nav-link" th:href="@{/aluno/vantagens}">
                        <i class="fas fa-gift me-1"></i>Vantagens
                    </a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('ALUNO')">
                    <a class="nav-link" th:href="@{/aluno/extrato}">
                        <i class="fas fa-list me-1"></i>Extrato
                    </a>
                </li>

                <!-- PROFESSOR -->
                <li class="nav-item" sec:authorize="hasRole('PROFESSOR')">
                    <a class="nav-link" th:href="@{/professor/dashboard}">
                        <i class="fas fa-home me-1"></i>Início
                    </a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('PROFESSOR')">
                    <a class="nav-link" th:href="@{/professor/enviar-moedas}">
                        <i class="fas fa-paper-plane me-1"></i>Enviar Moedas
                    </a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('PROFESSOR')">
                    <a class="nav-link" th:href="@{/professor/extrato}">
                        <i class="fas fa-list me-1"></i>Extrato
                    </a>
                </li>

                <!-- ADMIN -->
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:href="@{/admin/professores}">
                        <i class="fas fa-user-tie me-1"></i>Professores
                    </a>
                </li>

                <!-- EMPRESA -->
                <li class="nav-item" sec:authorize="hasRole('EMPRESA')">
                    <a class="nav-link" th:href="@{/empresa/dashboard}">
                        <i class="fas fa-home me-1"></i>Início
                    </a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('EMPRESA')">
                    <a class="nav-link" th:href="@{/empresa/vantagens}">
                        <i class="fas fa-tags me-1"></i>Minhas Vantagens
                    </a>
                </li>
            </ul>

            <!-- Usuário logado -->
            <ul class="navbar-nav ms-auto" sec:authorize="isAuthenticated()">
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle d-flex align-items-center gap-2" href="#"
                       data-bs-toggle="dropdown">
                        <div class="rounded-circle bg-warning d-flex align-items-center justify-content-center"
                             style="width:32px;height:32px">
                            <i class="fas fa-user text-dark small"></i>
                        </div>
                        <span sec:authentication="name">usuário</span>
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li sec:authorize="hasRole('ALUNO')">
                            <a class="dropdown-item" th:href="@{/aluno/perfil}">
                                <i class="fas fa-user-edit me-2"></i>Meu Perfil
                            </a>
                        </li>
                        <li sec:authorize="hasRole('EMPRESA')">
                            <a class="dropdown-item" th:href="@{/empresa/perfil}">
                                <i class="fas fa-building me-2"></i>Perfil da Empresa
                            </a>
                        </li>
                        <li><hr class="dropdown-divider"/></li>
                        <li>
                            <form th:action="@{/auth/logout}" method="post">
                                <button type="submit" class="dropdown-item text-danger">
                                    <i class="fas fa-sign-out-alt me-2"></i>Sair
                                </button>
                            </form>
                        </li>
                    </ul>
                </li>
            </ul>
        </div>
    </div>
</nav>
</body>
</html>
