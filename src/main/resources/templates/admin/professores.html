<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head th:replace="~{fragments/head :: head('Gerenciar Professores')}"></head>
<body class="bg-light d-flex flex-column min-vh-100">

<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<main class="container py-4 flex-grow-1">

    <div class="mb-4">
        <h4 class="fw-bold mb-0"><i class="fas fa-user-tie text-primary me-2"></i>Gerenciar Professores</h4>
        <p class="text-muted small mb-0">A instituição cadastra os professores que receberão moedas para distribuir.</p>
    </div>

    <div th:if="${sucesso}" class="alert alert-success alert-dismissible fade show">
        <i class="fas fa-circle-check me-2"></i><span th:text="${sucesso}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${erro}" class="alert alert-danger d-flex align-items-center gap-2">
        <i class="fas fa-circle-exclamation"></i><span th:text="${erro}"></span>
    </div>

    <div class="row g-4">
        <div class="col-lg-5">
            <div class="card shadow-sm border-0 rounded-4">
                <div class="card-body p-4">
                    <h6 class="fw-bold mb-3"><i class="fas fa-user-plus text-success me-2"></i>Novo Professor</h6>
                    <form th:action="@{/admin/professores}" th:object="${professor}" method="post">
                        <div class="mb-3">
                            <label class="form-label fw-medium">Nome completo <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" th:field="*{nome}" required/>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-medium">E-mail <span class="text-danger">*</span></label>
                            <input type="email" class="form-control" th:field="*{email}"
                                   placeholder="professor@instituicao.br" required/>
                        </div>
                        <div class="row g-3">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-medium">CPF <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" th:field="*{cpf}"
                                       placeholder="000.000.000-00" maxlength="14" required/>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-medium">Departamento <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" th:field="*{departamento}"
                                       placeholder="Ex: Engenharia de Software" required/>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-medium">Instituição <span class="text-danger">*</span></label>
                            <select class="form-select" th:field="*{instituicao.id}" required>
                                <option value="">Selecione a instituição...</option>
                                <option th:each="inst : ${instituicoes}"
                                        th:value="${inst.id}" th:text="${inst}"></option>
                            </select>
                        </div>
                        <div class="row g-3">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-medium">Senha <span class="text-danger">*</span></label>
                                <input type="password" class="form-control" name="senha"
                                       placeholder="Mínimo 6 caracteres" required minlength="6"/>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-medium">Confirmar senha <span class="text-danger">*</span></label>
                                <input type="password" class="form-control" name="confirmarSenha"
                                       required minlength="6"/>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
                            <i class="fas fa-user-plus me-2"></i>Cadastrar Professor
                        </button>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-lg-7">
            <div class="card shadow-sm border-0 rounded-4">
                <div class="card-header bg-white rounded-top-4 py-3 px-4">
                    <h6 class="fw-bold mb-0">
                        <i class="fas fa-chalkboard-user text-primary me-2"></i>Professores Cadastrados
                        <span class="badge bg-secondary ms-1" th:text="${#lists.size(professores)}">0</span>
                    </h6>
                </div>
                <div class="card-body p-0">
                    <div th:if="${#lists.isEmpty(professores)}" class="text-center py-5 text-muted">
                        <i class="fas fa-user-tie fa-2x mb-2 d-block"></i>
                        Nenhum professor cadastrado ainda.
                    </div>
                    <div th:if="${!#lists.isEmpty(professores)}" class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="table-light">
                            <tr>
                                <th class="ps-4">Professor</th>
                                <th>Departamento</th>
                                <th>Instituição</th>
                                <th class="text-end pe-4">Saldo</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="p : ${professores}">
                                <td class="ps-4">
                                    <div class="fw-medium" th:text="${p.nome}"></div>
                                    <div class="text-muted small" th:text="${p.email}"></div>
                                </td>
                                <td th:text="${p.departamento}"></td>
                                <td th:text="${p.instituicao != null ? p.instituicao.nome : '—'}"></td>
                                <td class="text-end pe-4">
                                    <i class="fas fa-coins text-warning me-1"></i>
                                    <span th:text="${p.saldoMoedas}"></span>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
