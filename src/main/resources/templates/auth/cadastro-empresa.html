<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head th:replace="~{fragments/head :: head('Cadastro de Empresa Parceira')}"></head>
<body class="bg-light d-flex flex-column min-vh-100">

<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<main class="container py-5 flex-grow-1">
    <div class="row justify-content-center">
        <div class="col-lg-6 col-xl-5">

            <div class="card shadow-sm border-0 rounded-4">
                <div class="card-body p-4 p-md-5">

                    <div class="text-center mb-4">
                        <div class="bg-success bg-opacity-10 rounded-circle d-inline-flex align-items-center justify-content-center mb-3"
                             style="width:64px;height:64px">
                            <i class="fas fa-building fs-3 text-success"></i>
                        </div>
                        <h3 class="fw-bold">Cadastro de Empresa</h3>
                        <p class="text-muted">Torne-se parceira e ofereça vantagens aos alunos.</p>
                    </div>

                    <div th:if="${erro}" class="alert alert-danger d-flex align-items-center gap-2">
                        <i class="fas fa-circle-exclamation"></i>
                        <span th:text="${erro}"></span>
                    </div>

                    <form th:action="@{/auth/cadastro-empresa}" th:object="${empresa}" method="post"
                          class="needs-validation" novalidate>

                        <div class="row g-3">
                            <div class="col-12">
                                <label class="form-label fw-medium">Nome Fantasia <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" th:field="*{nomeFantasia}"
                                       placeholder="Nome da sua empresa" required/>
                            </div>

                            <div class="col-12">
                                <label class="form-label fw-medium">E-mail <span class="text-danger">*</span></label>
                                <input type="email" class="form-control" th:field="*{email}"
                                       placeholder="contato@empresa.com" required/>
                            </div>

                            <div class="col-12">
                                <label class="form-label fw-medium">CNPJ <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" th:field="*{cnpj}"
                                       placeholder="00.000.000/0000-00" maxlength="18" required/>
                            </div>

                            <hr class="my-2"/>

                            <div class="col-md-6">
                                <label class="form-label fw-medium">Senha <span class="text-danger">*</span></label>
                                <input type="password" class="form-control" name="senha"
                                       placeholder="Mínimo 6 caracteres" required minlength="6"/>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-medium">Confirmar senha <span class="text-danger">*</span></label>
                                <input type="password" class="form-control" name="confirmarSenha"
                                       placeholder="Repita a senha" required minlength="6"/>
                            </div>

                            <div class="col-12 mt-2">
                                <button type="submit" class="btn btn-success w-100 py-2 fw-semibold">
                                    <i class="fas fa-building me-2"></i>Cadastrar empresa
                                </button>
                            </div>
                        </div>
                    </form>

                    <div class="text-center mt-3">
                        <a th:href="@{/auth/login}" class="text-muted small">
                            <i class="fas fa-arrow-left me-1"></i>Já tenho conta
                        </a>
                    </div>
                </div>
            </div>

        </div>
    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
