<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head th:replace="~{fragments/head :: head('Meu Perfil')}"></head>
<body class="bg-light d-flex flex-column min-vh-100">

<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<main class="container py-4 flex-grow-1">
    <div class="row justify-content-center">
        <div class="col-lg-6">

            <div class="d-flex align-items-center gap-2 mb-4">
                <i class="fas fa-user-edit text-primary fs-4"></i>
                <h4 class="fw-bold mb-0">Meu Perfil</h4>
            </div>

            <div th:if="${sucesso}" class="alert alert-success alert-dismissible fade show">
                <i class="fas fa-circle-check me-2"></i><span th:text="${sucesso}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div th:if="${erro}" class="alert alert-danger alert-dismissible fade show">
                <i class="fas fa-circle-exclamation me-2"></i><span th:text="${erro}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div class="card border-0 shadow-sm rounded-4">
                <div class="card-body p-4">

                    <!-- Info imutáveis -->
                    <div class="mb-4 p-3 bg-light rounded-3">
                        <small class="text-muted d-block mb-1">E-mail (não editável)</small>
                        <strong th:text="${aluno.email}"></strong>

                        <small class="text-muted d-block mb-1 mt-2">CPF</small>
                        <strong th:text="${aluno.cpf}"></strong>

                        <small class="text-muted d-block mb-1 mt-2">Instituição</small>
                        <strong th:text="${aluno.instituicao}"></strong>

                        <small class="text-muted d-block mb-1 mt-2">Saldo de Moedas</small>
                        <strong class="text-warning"><i class="fas fa-coins me-1"></i>
                            <span th:text="${aluno.saldoMoedas}"></span>
                        </strong>
                    </div>

                    <form th:action="@{/aluno/perfil}" th:object="${aluno}" method="post">
                        <div class="row g-3">
                            <div class="col-12">
                                <label class="form-label fw-medium">Nome completo</label>
                                <input type="text" class="form-control" th:field="*{nome}" required/>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-medium">RG</label>
                                <input type="text" class="form-control" th:field="*{rg}" required/>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-medium">Curso</label>
                                <input type="text" class="form-control" th:field="*{curso}" required/>
                            </div>
                            <div class="col-12">
                                <label class="form-label fw-medium">Endereço</label>
                                <input type="text" class="form-control" th:field="*{endereco}" required/>
                            </div>
                            <div class="col-12">
                                <button type="submit" class="btn btn-primary w-100 py-2">
                                    <i class="fas fa-save me-2"></i>Salvar alterações
                                </button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
