<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head th:replace="~{fragments/head :: head('Meu Extrato')}"></head>
<body class="bg-light d-flex flex-column min-vh-100">

<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<main class="container py-4 flex-grow-1">

    <div class="d-flex align-items-center gap-2 mb-4">
        <i class="fas fa-list text-primary fs-4"></i>
        <h4 class="fw-bold mb-0">Meu Extrato</h4>
        <span class="badge bg-primary ms-1" th:text="${aluno.saldoMoedas + ' moedas'}"></span>
    </div>

    <!-- Recebimentos -->
    <div class="card border-0 shadow-sm rounded-4 mb-4">
        <div class="card-header bg-white rounded-top-4 py-3 px-4">
            <h6 class="fw-bold mb-0 text-success">
                <i class="fas fa-arrow-down me-2"></i>Moedas Recebidas
            </h6>
        </div>
        <div class="card-body p-0">
            <div th:if="${recebimentos.isEmpty()}" class="text-center py-4 text-muted">
                Nenhum recebimento registrado.
            </div>
            <div th:if="${!recebimentos.isEmpty()}" class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead class="table-light">
                    <tr>
                        <th class="ps-4">Data</th>
                        <th>Professor</th>
                        <th>Motivo</th>
                        <th class="text-end pe-4">Moedas</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="r : ${recebimentos}">
                        <td class="ps-4 text-muted small"
                            th:text="${#temporals.format(r.dataHora, 'dd/MM/yyyy HH:mm')}"></td>
                        <td class="fw-medium" th:text="${r.professor.nome}"></td>
                        <td class="text-muted" th:text="${r.mensagem}"></td>
                        <td class="text-end pe-4">
                            <span class="badge bg-success">+<span th:text="${r.valor}"></span></span>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Resgates -->
    <div class="card border-0 shadow-sm rounded-4">
        <div class="card-header bg-white rounded-top-4 py-3 px-4">
            <h6 class="fw-bold mb-0 text-danger">
                <i class="fas fa-arrow-up me-2"></i>Resgates de Vantagens
            </h6>
        </div>
        <div class="card-body p-0">
            <div th:if="${resgates.isEmpty()}" class="text-center py-4 text-muted">
                Você ainda não resgatou nenhuma vantagem.
            </div>
            <div th:if="${!resgates.isEmpty()}" class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead class="table-light">
                    <tr>
                        <th class="ps-4">Data</th>
                        <th>Vantagem</th>
                        <th>Empresa</th>
                        <th>Código do Cupom</th>
                        <th class="text-end pe-4">Moedas</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="r : ${resgates}">
                        <td class="ps-4 text-muted small"
                            th:text="${#temporals.format(r.dataHora, 'dd/MM/yyyy HH:mm')}"></td>
                        <td class="fw-medium" th:text="${r.vantagem.nome}"></td>
                        <td class="text-muted" th:text="${r.vantagem.empresaParceira.nomeFantasia}"></td>
                        <td>
                            <code class="bg-light px-2 py-1 rounded" th:text="${r.codigoCupom}"></code>
                        </td>
                        <td class="text-end pe-4">
                            <span class="badge bg-danger">-<span th:text="${r.valor}"></span></span>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmHBGFNB9J8+wgMH3/+PY4JEy2O"
        crossorigin="anonymous"></script>
</body>
</html>
