<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head th:replace="~{fragments/head :: head('Dashboard')}"></head>
<body class="bg-light d-flex flex-column min-vh-100">

<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<main class="container py-4 flex-grow-1">

    <!-- Saudação -->
    <div class="d-flex align-items-center justify-content-between mb-4 flex-wrap gap-2">
        <div>
            <h4 class="fw-bold mb-0">Olá, <span th:text="${aluno.nome.split(' ')[0]}">Aluno</span>! 👋</h4>
            <p class="text-muted small mb-0" th:text="${aluno.instituicao.nome + ' — ' + aluno.curso}"></p>
        </div>
        <a th:href="@{/aluno/vantagens}" class="btn btn-primary">
            <i class="fas fa-gift me-1"></i>Ver Vantagens
        </a>
    </div>

    <!-- Alertas flash -->
    <div th:if="${sucesso}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="fas fa-circle-check me-2"></i><span th:text="${sucesso}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${erro}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="fas fa-circle-exclamation me-2"></i><span th:text="${erro}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Cards de estatísticas -->
    <div class="row g-4 mb-4">
        <div class="col-md-4">
            <div class="card border-0 shadow-sm rounded-4 h-100">
                <div class="card-body d-flex align-items-center gap-3 p-4">
                    <div class="rounded-circle bg-warning bg-opacity-15 p-3">
                        <i class="fas fa-coins text-warning fs-3"></i>
                    </div>
                    <div>
                        <p class="text-muted small mb-1">Saldo de Moedas</p>
                        <h2 class="fw-bold mb-0 text-dark" th:text="${aluno.saldoMoedas}">0</h2>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card border-0 shadow-sm rounded-4 h-100">
                <div class="card-body d-flex align-items-center gap-3 p-4">
                    <div class="rounded-circle bg-primary bg-opacity-10 p-3">
                        <i class="fas fa-arrow-down text-primary fs-3"></i>
                    </div>
                    <div>
                        <p class="text-muted small mb-1">Recebimentos</p>
                        <h2 class="fw-bold mb-0 text-dark" th:text="${recentes.size()}">0</h2>
                        <p class="text-muted small mb-0">(últimas transações)</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card border-0 shadow-sm rounded-4 h-100">
                <div class="card-body d-flex align-items-center gap-3 p-4">
                    <div class="rounded-circle bg-success bg-opacity-10 p-3">
                        <i class="fas fa-gift text-success fs-3"></i>
                    </div>
                    <div>
                        <p class="text-muted small mb-1">Perfil</p>
                        <h6 class="fw-bold mb-0 text-dark" th:text="${aluno.curso}">Curso</h6>
                        <p class="text-muted small mb-0" th:text="${aluno.instituicao.nome}"></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Últimas transações -->
    <div class="card border-0 shadow-sm rounded-4">
        <div class="card-header bg-white rounded-top-4 d-flex align-items-center justify-content-between py-3 px-4">
            <h6 class="fw-bold mb-0"><i class="fas fa-clock-rotate-left text-primary me-2"></i>Recebimentos Recentes</h6>
            <a th:href="@{/aluno/extrato}" class="btn btn-link btn-sm text-decoration-none">
                Ver extrato completo <i class="fas fa-arrow-right ms-1"></i>
            </a>
        </div>
        <div class="card-body p-0">
            <div th:if="${recentes.isEmpty()}" class="text-center py-5 text-muted">
                <i class="fas fa-inbox fa-2x mb-2 d-block"></i>
                Nenhuma transação ainda. Peça para seu professor enviar moedas!
            </div>
            <div th:if="${!recentes.isEmpty()}" class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead class="table-light">
                    <tr>
                        <th class="ps-4">Professor</th>
                        <th>Motivo</th>
                        <th class="text-end pe-4">Moedas</th>
                        <th class="text-end pe-4">Data</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="t : ${recentes}">
                        <td class="ps-4 fw-medium" th:text="${t.professor.nome}"></td>
                        <td class="text-muted" th:text="${t.mensagem}"></td>
                        <td class="text-end pe-4">
                            <span class="badge bg-success fs-6">+<span th:text="${t.valor}"></span></span>
                        </td>
                        <td class="text-end pe-4 text-muted small"
                            th:text="${#temporals.format(t.dataHora, 'dd/MM/yyyy')}"></td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
