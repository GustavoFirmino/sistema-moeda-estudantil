<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head th:replace="~{fragments/head :: head('Extrato do Professor')}"></head>
<body class="bg-light d-flex flex-column min-vh-100">

<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<main class="container py-4 flex-grow-1">

    <div class="d-flex align-items-center justify-content-between mb-4 flex-wrap gap-2">
        <div class="d-flex align-items-center gap-2">
            <i class="fas fa-list text-primary fs-4"></i>
            <h4 class="fw-bold mb-0">Extrato de Envios</h4>
        </div>
        <div class="bg-primary bg-opacity-10 border border-primary border-opacity-25 rounded-pill px-3 py-2">
            <i class="fas fa-wallet text-primary me-1"></i>
            <span class="fw-bold text-primary" th:text="${professor.saldoMoedas + ' moedas disponíveis'}"></span>
        </div>
    </div>

    <div class="card border-0 shadow-sm rounded-4">
        <div class="card-body p-0">
            <div th:if="${envios.isEmpty()}" class="text-center py-5 text-muted">
                <i class="fas fa-paper-plane fa-2x mb-2 d-block"></i>
                Nenhum envio realizado ainda.
            </div>
            <div th:if="${!envios.isEmpty()}" class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead class="table-light">
                    <tr>
                        <th class="ps-4">Data e Hora</th>
                        <th>Aluno</th>
                        <th>Motivo</th>
                        <th class="text-end pe-4">Moedas Enviadas</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="e : ${envios}">
                        <td class="ps-4 text-muted small"
                            th:text="${#temporals.format(e.dataHora, 'dd/MM/yyyy HH:mm')}"></td>
                        <td>
                            <span class="fw-medium" th:text="${e.aluno.nome}"></span>
                            <br/>
                            <small class="text-muted" th:text="${e.aluno.email}"></small>
                        </td>
                        <td class="text-muted" th:text="${e.mensagem}"></td>
                        <td class="text-end pe-4">
                            <span class="badge bg-primary fs-6">-<span th:text="${e.valor}"></span></span>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmHBGFNB9J8+wgMH3/+PY4JEy2O"
        crossorigin="anonymous"></script>
</body>
</html>
