<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head th:replace="~{fragments/head :: head('Enviar Moedas')}"></head>
<body class="bg-light d-flex flex-column min-vh-100">

<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<main class="container py-4 flex-grow-1">
    <div class="row justify-content-center">
        <div class="col-lg-6">

            <div class="d-flex align-items-center gap-2 mb-4">
                <i class="fas fa-paper-plane text-primary fs-4"></i>
                <h4 class="fw-bold mb-0">Enviar Moedas</h4>
            </div>

            <!-- Saldo disponível -->
            <div class="alert alert-info d-flex align-items-center gap-2 mb-4">
                <i class="fas fa-wallet"></i>
                <span>Seu saldo disponível: <strong th:text="${professor.saldoMoedas + ' moedas'}"></strong></span>
            </div>

            <div th:if="${sucesso}" class="alert alert-success alert-dismissible fade show">
                <i class="fas fa-circle-check me-2"></i><span th:text="${sucesso}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div th:if="${erro}" class="alert alert-danger alert-dismissible fade show">
                <i class="fas fa-circle-exclamation me-2"></i><span th:text="${erro}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div class="card border-0 shadow-sm rounded-4">
                <div class="card-body p-4">
                    <form th:action="@{/professor/enviar-moedas}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                        <div class="mb-3">
                            <label class="form-label fw-medium">Selecionar Aluno <span class="text-danger">*</span></label>
                            <select class="form-select" name="alunoId" required>
                                <option value="">Escolha o aluno...</option>
                                <option th:each="a : ${alunos}"
                                        th:value="${a.id}"
                                        th:text="${a.nome + ' — ' + a.instituicao.nome}"></option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-medium">Quantidade de Moedas <span class="text-danger">*</span></label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-coins text-warning"></i></span>
                                <input type="number" class="form-control" name="valor"
                                       min="1" th:max="${professor.saldoMoedas}"
                                       placeholder="Ex: 50" required/>
                            </div>
                            <div class="form-text">Máximo: <span th:text="${professor.saldoMoedas}"></span> moedas.</div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-medium">Motivo do Reconhecimento <span class="text-danger">*</span></label>
                            <textarea class="form-control" name="mensagem" rows="4"
                                      placeholder="Ex: Excelente participação nas aulas práticas e apresentação brilhante do seminário..."
                                      required minlength="10" maxlength="500"></textarea>
                            <div class="form-text">Mínimo de 10 caracteres. Esta mensagem será enviada ao aluno por e-mail.</div>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
                            <i class="fas fa-paper-plane me-2"></i>Enviar Moedas
                        </button>
                    </form>
                </div>
            </div>

        </div>
    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmHBGFNB9J8+wgMH3/+PY4JEy2O"
        crossorigin="anonymous"></script>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
