<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head th:replace="~{fragments/head :: head('Perfil da Empresa')}"></head>
<body class="bg-light d-flex flex-column min-vh-100">

<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<main class="container py-4 flex-grow-1">
    <div class="row justify-content-center">
        <div class="col-lg-5">

            <div class="d-flex align-items-center gap-2 mb-4">
                <i class="fas fa-building text-success fs-4"></i>
                <h4 class="fw-bold mb-0">Perfil da Empresa</h4>
            </div>

            <div th:if="${sucesso}" class="alert alert-success alert-dismissible fade show">
                <i class="fas fa-circle-check me-2"></i><span th:text="${sucesso}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div th:if="${erro}" class="alert alert-danger alert-dismissible fade show">
                <i class="fas fa-circle-exclamation me-2"></i><span th:text="${erro}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div class="card border-0 shadow-sm rounded-4">
                <div class="card-body p-4">
                    <div class="mb-4 p-3 bg-light rounded-3">
                        <small class="text-muted d-block mb-1">E-mail</small>
                        <strong th:text="${empresa.email}"></strong>
                        <small class="text-muted d-block mb-1 mt-2">CNPJ</small>
                        <strong th:text="${empresa.cnpj}"></strong>
                    </div>

                    <form th:action="@{/empresa/perfil}" th:object="${empresa}" method="post">
                        <div class="mb-3">
                            <label class="form-label fw-medium">Nome Fantasia</label>
                            <input type="text" class="form-control" th:field="*{nomeFantasia}" required/>
                        </div>
                        <button type="submit" class="btn btn-success w-100 py-2">
                            <i class="fas fa-save me-2"></i>Salvar alterações
                        </button>
                    </form>

                    <hr class="my-4"/>

                    <form th:action="@{/empresa/desativar}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <button type="submit" class="btn btn-outline-danger w-100 py-2"
                                onclick="return confirm('Desativar esta conta?')">
                            <i class="fas fa-user-slash me-2"></i>Desativar conta
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
