<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head th:replace="~{fragments/head :: head('Nova Vantagem')}"></head>
<body class="bg-light d-flex flex-column min-vh-100">

<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<main class="container py-4 flex-grow-1">
    <div class="row justify-content-center">
        <div class="col-lg-6">

            <div class="d-flex align-items-center gap-2 mb-4">
                <i class="fas fa-plus-circle text-success fs-4"></i>
                <h4 class="fw-bold mb-0">Nova Vantagem</h4>
            </div>

            <div th:if="${erro}" class="alert alert-danger alert-dismissible fade show">
                <i class="fas fa-circle-exclamation me-2"></i><span th:text="${erro}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div class="card border-0 shadow-sm rounded-4">
                <div class="card-body p-4">
                    <form th:action="@{/empresa/vantagens}" th:object="${vantagem}" method="post"
                          enctype="multipart/form-data">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                        <div class="row g-3">
                            <div class="col-12">
                                <label class="form-label fw-medium">Nome da Vantagem <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" th:field="*{nome}"
                                       placeholder="Ex: Desconto no restaurante universitário" required/>
                            </div>

                            <div class="col-12">
                                <label class="form-label fw-medium">Descrição <span class="text-danger">*</span></label>
                                <textarea class="form-control" th:field="*{descricao}" rows="4"
                                          placeholder="Descreva detalhes da vantagem, como usar, onde utilizar..."
                                          required></textarea>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label fw-medium">Custo em Moedas <span class="text-danger">*</span></label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fas fa-coins text-warning"></i></span>
                                    <input type="number" class="form-control" th:field="*{custoMoedas}"
                                           placeholder="Ex: 100" min="1" required/>
                                </div>
                            </div>

                            <div class="col-12">
                                <label class="form-label fw-medium">Foto do Produto</label>
                                <input type="file" class="form-control" name="foto"
                                       accept="image/*" id="fotoInput"
                                       onchange="previewFoto(this)"/>
                                <div class="form-text">JPG, PNG ou GIF. Máx. 5MB.</div>
                                <div class="mt-2" id="previewContainer" style="display:none;">
                                    <img id="previewImg" src="" alt="Preview"
                                         class="rounded-3 object-fit-cover border"
                                         style="max-height:180px;max-width:100%"/>
                                </div>
                            </div>

                            <div class="col-12 mt-2">
                                <button type="submit" class="btn btn-success w-100 py-2 fw-semibold">
                                    <i class="fas fa-plus me-2"></i>Cadastrar Vantagem
                                </button>
                                <a th:href="@{/empresa/vantagens}" class="btn btn-link w-100 mt-1 text-muted">
                                    Cancelar
                                </a>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
<script>
    function previewFoto(input) {
        const container = document.getElementById('previewContainer');
        const img = document.getElementById('previewImg');
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = e => { img.src = e.target.result; container.style.display = 'block'; };
            reader.readAsDataURL(input.files[0]);
        }
    }
</script>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
