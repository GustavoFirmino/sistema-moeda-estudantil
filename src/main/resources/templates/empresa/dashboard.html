<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head th:replace="~{fragments/head :: head('Dashboard Empresa')}"></head>
<body class="bg-light d-flex flex-column min-vh-100">

<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<main class="container py-4 flex-grow-1">

    <div class="d-flex align-items-center justify-content-between mb-4 flex-wrap gap-2">
        <div>
            <h4 class="fw-bold mb-0" th:text="'Bem-vindo(a), ' + ${empresa.nomeFantasia} + '!'"></h4>
            <p class="text-muted small mb-0">Gerencie suas vantagens e acompanhe os resgates.</p>
        </div>
        <a th:href="@{/empresa/vantagens/nova}" class="btn btn-success">
            <i class="fas fa-plus me-1"></i>Nova Vantagem
        </a>
    </div>

    <div th:if="${sucesso}" class="alert alert-success alert-dismissible fade show">
        <i class="fas fa-circle-check me-2"></i><span th:text="${sucesso}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Estatísticas -->
    <div class="row g-4 mb-4">
        <div class="col-md-4">
            <div class="card border-0 shadow-sm rounded-4 h-100">
                <div class="card-body d-flex align-items-center gap-3 p-4">
                    <div class="rounded-circle bg-success bg-opacity-10 p-3">
                        <i class="fas fa-tags text-success fs-3"></i>
                    </div>
                    <div>
                        <p class="text-muted small mb-1">Total de Vantagens</p>
                        <h2 class="fw-bold mb-0" th:text="${vantagens.size()}">0</h2>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card border-0 shadow-sm rounded-4 h-100">
                <div class="card-body d-flex align-items-center gap-3 p-4">
                    <div class="rounded-circle bg-primary bg-opacity-10 p-3">
                        <i class="fas fa-check-circle text-primary fs-3"></i>
                    </div>
                    <div>
                        <p class="text-muted small mb-1">Vantagens Ativas</p>
                        <h2 class="fw-bold mb-0"
                            th:text="${vantagens.stream().filter(v -> v.isAtiva()).count()}">0</h2>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card border-0 shadow-sm rounded-4 h-100">
                <div class="card-body d-flex align-items-center gap-3 p-4">
                    <div class="rounded-circle bg-warning bg-opacity-15 p-3">
                        <i class="fas fa-building text-warning fs-3"></i>
                    </div>
                    <div>
                        <p class="text-muted small mb-1">CNPJ</p>
                        <h6 class="fw-bold mb-0" th:text="${empresa.cnpj}"></h6>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Lista de vantagens -->
    <div class="card border-0 shadow-sm rounded-4">
        <div class="card-header bg-white rounded-top-4 d-flex align-items-center justify-content-between py-3 px-4">
            <h6 class="fw-bold mb-0"><i class="fas fa-tags text-success me-2"></i>Suas Vantagens</h6>
            <a th:href="@{/empresa/vantagens}" class="btn btn-link btn-sm text-decoration-none">
                Gerenciar <i class="fas fa-arrow-right ms-1"></i>
            </a>
        </div>
        <div class="card-body p-0">
            <div th:if="${vantagens.isEmpty()}" class="text-center py-5 text-muted">
                <i class="fas fa-tags fa-2x mb-2 d-block"></i>
                Nenhuma vantagem cadastrada. Clique em "Nova Vantagem" para começar!
            </div>
            <div th:if="${!vantagens.isEmpty()}" class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead class="table-light">
                    <tr>
                        <th class="ps-4">Vantagem</th>
                        <th>Custo</th>
                        <th>Status</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="v : ${vantagens}">
                        <td class="ps-4 fw-medium" th:text="${v.nome}"></td>
                        <td>
                            <i class="fas fa-coins text-warning me-1"></i>
                            <span th:text="${v.custoMoedas}"></span>
                        </td>
                        <td>
                            <span th:if="${v.isAtiva()}" class="badge bg-success">Ativa</span>
                            <span th:if="${!v.isAtiva()}" class="badge bg-secondary">Inativa</span>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmHBGFNB9J8+wgMH3/+PY4JEy2O"
        crossorigin="anonymous"></script>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
