<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head th:replace="~{fragments/head :: head('Minhas Vantagens')}"></head>
<body class="bg-light d-flex flex-column min-vh-100">

<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<main class="container py-4 flex-grow-1">

    <div class="d-flex align-items-center justify-content-between mb-4 flex-wrap gap-2">
        <div class="d-flex align-items-center gap-2">
            <i class="fas fa-tags text-success fs-4"></i>
            <h4 class="fw-bold mb-0">Minhas Vantagens</h4>
        </div>
        <a th:href="@{/empresa/vantagens/nova}" class="btn btn-success">
            <i class="fas fa-plus me-1"></i>Nova Vantagem
        </a>
    </div>

    <div th:if="${sucesso}" class="alert alert-success alert-dismissible fade show">
        <i class="fas fa-circle-check me-2"></i><span th:text="${sucesso}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${erro}" class="alert alert-danger alert-dismissible fade show">
        <i class="fas fa-circle-exclamation me-2"></i><span th:text="${erro}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div th:if="${vantagens.isEmpty()}" class="text-center py-5 text-muted">
        <i class="fas fa-tags fa-3x mb-3 d-block"></i>
        <h5>Nenhuma vantagem cadastrada ainda.</h5>
        <a th:href="@{/empresa/vantagens/nova}" class="btn btn-success mt-2">Cadastrar primeira vantagem</a>
    </div>

    <div class="row g-4" th:if="${!vantagens.isEmpty()}">
        <div class="col-md-6 col-lg-4" th:each="v : ${vantagens}">
            <div class="card border-0 shadow-sm rounded-4 h-100">
                <div class="position-relative">
                    <img th:if="${v.fotoUrl != null}"
                         th:src="${v.fotoUrl}"
                         class="card-img-top rounded-top-4 object-fit-cover"
                         style="height: 160px;"
                         th:alt="${v.nome}"/>
                    <div th:if="${v.fotoUrl == null}"
                         class="d-flex align-items-center justify-content-center bg-light rounded-top-4"
                         style="height: 160px;">
                        <i class="fas fa-image fa-2x text-muted"></i>
                    </div>
                    <span th:if="${v.isAtiva()}" class="position-absolute top-0 start-0 m-2 badge bg-success">Ativa</span>
                    <span th:if="${!v.isAtiva()}" class="position-absolute top-0 start-0 m-2 badge bg-secondary">Inativa</span>
                </div>
                <div class="card-body d-flex flex-column p-3">
                    <h6 class="fw-bold mb-1" th:text="${v.nome}"></h6>
                    <p class="text-muted small flex-grow-1" th:text="${v.descricao}"></p>
                    <div class="d-flex align-items-center justify-content-between mt-2">
                        <div>
                            <i class="fas fa-coins text-warning me-1"></i>
                            <strong th:text="${v.custoMoedas}"></strong>
                            <span class="text-muted small"> moedas</span>
                        </div>
                        <div class="d-flex gap-1">
                            <a th:href="@{/empresa/vantagens/{id}/editar(id=${v.id})}"
                               class="btn btn-outline-primary btn-sm">
                                <i class="fas fa-edit"></i>
                            </a>
                            <form th:if="${v.isAtiva()}"
                                  th:action="@{/empresa/vantagens/{id}/desativar(id=${v.id})}" method="post">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <button type="submit" class="btn btn-outline-danger btn-sm"
                                        onclick="return confirm('Desativar esta vantagem?')">
                                    <i class="fas fa-ban"></i>
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
