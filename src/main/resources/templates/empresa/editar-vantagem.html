<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head th:replace="~{fragments/head :: head('Editar Vantagem')}"></head>
<body class="bg-light d-flex flex-column min-vh-100">

<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<main class="container py-4 flex-grow-1">
    <div class="row justify-content-center">
        <div class="col-lg-6">

            <div class="d-flex align-items-center gap-2 mb-4">
                <i class="fas fa-edit text-primary fs-4"></i>
                <h4 class="fw-bold mb-0">Editar Vantagem</h4>
            </div>

            <div class="card border-0 shadow-sm rounded-4">
                <div class="card-body p-4">
                    <form th:action="@{/empresa/vantagens/{id}(id=${vantagem.id})}"
                          th:object="${vantagem}" method="post" enctype="multipart/form-data">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                        <div class="row g-3">
                            <div class="col-12">
                                <label class="form-label fw-medium">Nome da Vantagem <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" th:field="*{nome}" required/>
                            </div>

                            <div class="col-12">
                                <label class="form-label fw-medium">Descrição <span class="text-danger">*</span></label>
                                <textarea class="form-control" th:field="*{descricao}" rows="4" required></textarea>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label fw-medium">Custo em Moedas <span class="text-danger">*</span></label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fas fa-coins text-warning"></i></span>
                                    <input type="number" class="form-control" th:field="*{custoMoedas}" min="1" required/>
                                </div>
                            </div>

                            <div class="col-12" th:if="${vantagem.fotoUrl != null}">
                                <label class="form-label fw-medium">Foto atual</label>
                                <div>
                                    <img th:src="${vantagem.fotoUrl}" alt="Foto atual"
                                         class="rounded-3 border object-fit-cover"
                                         style="max-height:160px;max-width:100%"/>
                                </div>
                            </div>

                            <div class="col-12">
                                <label class="form-label fw-medium">Nova Foto (opcional)</label>
                                <input type="file" class="form-control" name="foto"
                                       accept="image/*" onchange="previewFoto(this)"/>
                                <div id="previewContainer" style="display:none;" class="mt-2">
                                    <img id="previewImg" src="" alt="Preview"
                                         class="rounded-3 border object-fit-cover"
                                         style="max-height:160px;max-width:100%"/>
                                </div>
                            </div>

                            <div class="col-12 mt-2 d-flex gap-2">
                                <button type="submit" class="btn btn-primary flex-grow-1 py-2">
                                    <i class="fas fa-save me-2"></i>Salvar Alterações
                                </button>
                                <a th:href="@{/empresa/vantagens}" class="btn btn-outline-secondary py-2">
                                    Cancelar
                                </a>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmHBGFNB9J8+wgMH3/+PY4JEy2O"
        crossorigin="anonymous"></script>
<script>
    function previewFoto(input) {
        const container = document.getElementById('previewContainer');
        const img = document.getElementById('previewImg');
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = e => { img.src = e.target.result; container.style.display = 'block'; };
            reader.readAsDataURL(input.files[0]);
        }
    }
</script>
</body>
</html>
